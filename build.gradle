plugins {
    id 'java'
    id 'io.github.freehij.mcartifact'
}

group = 'io.github.freehij'
version = '${mod_version}+${minecraft_version}'

repositories {
    mavenCentral()
    maven { url = 'https://jitpack.io' }
    maven { url = 'https://libraries.minecraft.net' }
}

dependencies {
    compileOnly 'com.github.freehij:javaagent-modloader:main-SNAPSHOT'
    compileOnly 'com.mojang:brigadier:1.3.10'
    compileOnly 'com.azure:azure-json:1.5.1'
    compileOnly 'org.jspecify:jspecify:1.0.0'
    compileOnly 'it.unimi.dsi:fastutil:8.5.18'
    compileOnly 'io.netty:netty-all:4.2.7.Final'
    compileOnly 'com.google.guava:guava:33.5.0-jre'
}

mcartifact {
    version = project.minecraft_version
    environment = project.environment
}

processResources {
    filesMatching('mod.properties') {
        expand(project.properties)
    }
}

jar {
    archiveFileName = "${project.name}-${project.mod_version}+${project.minecraft_version}.jar"
}